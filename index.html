<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>步天｜全量星官 · 沉浸式可点击星图</title>
<link rel="stylesheet" href="src/style.css">
</head>
<body>
<video id="camera" autoplay playsinline muted></video>
<canvas id="sky"></canvas>

<div class="top">
  <div class="brand">
    <div class="main"><span>步天</span> · 全量星官沉浸图</div>
    <div class="sub">同一星官的恒星以连线组合显示；星官名为黄色，恒星名为白色小字</div>
  </div>
  <div class="pill" id="status">正在初始化…</div>
</div>

<section class="panel on" id="detail">
  <h2 id="dName">正在载入数据…</h2>
  <div class="subline" id="dSub">请保持联网，以载入全量星官和亮星数据。</div>
  <div class="grid">
    <div class="card"><div class="k" id="k1">中国传统体系名称</div><div class="v" id="d1">—</div></div>
    <div class="card"><div class="k" id="k2">西方体系</div><div class="v" id="d2">—</div></div>
    <div class="card"><div class="k" id="k3">当前位置及可见程度</div><div class="v" id="d3">—</div></div>
    <div class="card"><div class="k" id="k4">对应星域分野及传统意向</div><div class="v" id="d4">—</div></div>
  </div>
  <p class="note" id="dDesc">拖动画面可以环顾四周；滚轮或设置里可调视场。手机上可开启方向传感器和相机叠加。</p>
</section>

<section class="settings" id="settings">
  <h2>设置</h2>
  <div class="field"><label>城市</label><select id="city">
    <option value="lausanne">洛桑 Lausanne</option><option value="zurich">苏黎世 Zürich</option>
    <option value="beijing">北京 Beijing</option><option value="shanghai">上海 Shanghai</option><option value="hongkong">香港 Hong Kong</option>
  </select></div>
  <div class="row"><div class="field"><label>纬度</label><input id="lat" type="number" step="0.0001"></div><div class="field"><label>经度</label><input id="lon" type="number" step="0.0001"></div></div>
  <div class="field"><label>时间</label><input id="dt" type="datetime-local"></div>
  <div class="field"><label>视场 FOV: <span id="fovText">95</span>°</label><input id="fov" type="range" min="35" max="125" value="95"></div>
  <div class="field"><label>星等限制: <span id="magText">6.0</span></label><input id="magLimit" type="range" min="0" max="6" step="0.1" value="6"></div>
  <div class="row"><button id="now">现在</button><button id="closeSettings">关闭</button></div>
  <div class="badge" id="dataBadge">数据载入中</div>
</section>

<section class="catalog" id="catalog">
  <h2>星官 / 星星搜索</h2>
  <div class="field"><label>搜索</label><input id="search" placeholder="例如：北斗、参、织女、Vega、HIP 91262"></div>
  <div class="note" id="catalogSummary">正在载入数据…</div>
  <div class="list" id="list"></div>
</section>

<div class="toolbar">
  <button id="sensorBtn" class="small">传感器</button>
  <button id="cameraBtn" class="small">相机</button>
  <button id="northBtn">朝北</button>
  <button id="catalogBtn">搜索</button>
  <button id="detailBtn" class="active">信息</button>
  <button id="settingsBtn">设置</button>
</div>
<div class="toast" id="toast"></div>

<script src="src/app.js"></script>
</body>
</html>
